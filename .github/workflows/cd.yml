name: cd

on:
  push:
    branches: [ main ]

jobs:

  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build the app
        run: ./scripts/buildprod.sh

      - name: Fake gcloud
        run: |
          echo -e '#!/bin/bash\necho "fake gcloud"\nexit 0' > gcloud
          chmod +x gcloud
          sudo mv gcloud /usr/local/bin/
